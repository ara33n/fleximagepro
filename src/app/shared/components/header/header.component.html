<header class="sticky top-0 z-40 border-b border-zinc-200 bg-white dark:border-zinc-800 dark:bg-zinc-950">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

    <!-- Main bar -->
    <div class="flex h-14 items-center justify-between gap-4">

      <!-- Logo -->
      <a
        routerLink="/"
        class="focus-ring flex shrink-0 items-center gap-2 rounded-lg font-bold tracking-tight text-zinc-900 dark:text-white"
        aria-label="FlexImagePro home"
        (click)="menuOpen.set(false)"
      >
        <img src="/assets/logo-96.png" width="36" height="36" alt="FlexImagePro logo" />
        <span class="text-base sm:text-lg">FlexImagePro</span>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden items-center gap-1 lg:flex" aria-label="Primary navigation">
        @for (link of links; track trackByPath($index, link)) {
          <a
            [routerLink]="link.path"
            routerLinkActive="bg-teal-50 text-teal-800 dark:bg-teal-950 dark:text-teal-200"
            class="focus-ring rounded-lg px-3 py-2 text-sm font-semibold text-zinc-700 transition hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800 dark:hover:text-white"
          >
            {{ link.label }}
          </a>
        }
      </nav>

      <!-- Right side actions -->
      <div class="flex items-center gap-2">
        <!-- Dark mode toggle -->
        <button
          type="button"
          (click)="theme.toggle()"
          class="focus-ring relative h-9 w-14 shrink-0 rounded-full border border-zinc-300 bg-white p-1 shadow-sm transition hover:border-teal-500 active:scale-[0.98] dark:border-zinc-600 dark:bg-zinc-800 dark:hover:border-teal-500"
          [attr.aria-label]="theme.darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <span
            class="absolute left-1 top-1 grid size-7 place-items-center rounded-full bg-zinc-900 text-[9px] font-bold text-white shadow-sm transition-transform duration-300 dark:translate-x-5 dark:bg-teal-400 dark:text-zinc-950"
            aria-hidden="true"
          >
            {{ theme.darkMode() ? 'DK' : 'LT' }}
          </span>
        </button>

        <!-- Hamburger (mobile only) -->
        <button
          type="button"
          class="focus-ring flex size-9 shrink-0 items-center justify-center rounded-lg border border-zinc-300 bg-white text-zinc-800 transition hover:bg-zinc-100 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-100 dark:hover:bg-zinc-700 lg:hidden"
          (click)="toggleMenu()"
          [attr.aria-label]="menuOpen() ? 'Close menu' : 'Open menu'"
          [attr.aria-expanded]="menuOpen()"
        >
          @if (menuOpen()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          }
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    @if (menuOpen()) {
      <nav class="border-t border-zinc-200 pb-3 pt-2 dark:border-zinc-700 lg:hidden" aria-label="Mobile navigation">
        <ul class="flex flex-col gap-1">
          @for (link of links; track trackByPath($index, link)) {
            <li>
              <a
                [routerLink]="link.path"
                routerLinkActive="bg-teal-50 text-teal-800 dark:bg-teal-950 dark:text-teal-200"
                class="focus-ring flex rounded-lg px-3 py-2.5 text-sm font-semibold text-zinc-700 transition hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800 dark:hover:text-white"
                (click)="menuOpen.set(false)"
              >
                {{ link.label }}
              </a>
            </li>
          }
        </ul>
      </nav>
    }

  </div>
</header>
