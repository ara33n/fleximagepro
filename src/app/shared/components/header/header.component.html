<header
  class="sticky top-0 z-40 border-b border-zinc-200/80 bg-white/90 backdrop-blur dark:border-zinc-800 dark:bg-zinc-950/90"
>
  <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-3 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between gap-4">
      <a
        routerLink="/"
        class="focus-ring flex min-w-0 items-center gap-2 rounded-lg font-semibold tracking-tight text-zinc-950 dark:text-white"
        aria-label="FlexImagePro home"
      >
        <img src="/assets/logo.png" width="45" height="45" alt="logo" />
        <span class="truncate text-lg">FlexImagePro</span>
      </a>

      <div class="flex items-center gap-2">
        <button
          type="button"
          (click)="theme.toggle()"
          class="focus-ring relative h-10 w-16 rounded-full border border-zinc-300 bg-white p-1 shadow-sm hover:border-teal-400 active:scale-[0.98] dark:border-zinc-700 dark:bg-zinc-900 dark:hover:border-teal-700"
          [attr.aria-label]="theme.darkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <span
            class="absolute left-1 top-1 grid size-8 place-items-center rounded-full bg-zinc-950 text-[10px] font-bold text-white shadow-sm transition-transform duration-300 dark:translate-x-6 dark:bg-teal-400 dark:text-zinc-950"
            aria-hidden="true"
          >
            {{ theme.darkMode() ? 'DK' : 'LT' }}
          </span>
        </button>
      </div>
    </div>

    <nav
      class="flex gap-2 overflow-x-auto rounded-lg border border-zinc-200 bg-zinc-100 p-1 text-sm shadow-inner dark:border-zinc-800 dark:bg-zinc-900"
      aria-label="Primary navigation"
    >
      @for (link of links; track trackByPath($index, link)) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bg-white text-zinc-950 shadow-sm ring-1 ring-zinc-200 dark:bg-zinc-950 dark:text-white dark:ring-zinc-800"
          class="focus-ring whitespace-nowrap rounded-md px-3 py-2 font-semibold text-zinc-700 hover:bg-white/80 hover:text-zinc-950 active:scale-[0.98] dark:text-zinc-300 dark:hover:bg-zinc-950/80 dark:hover:text-white"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </div>
</header>
