@if (installPrompt.visible()) {
  <aside
    class="fixed inset-x-3 bottom-3 z-50 mx-auto max-w-md rounded-lg border border-zinc-200 bg-white/95 p-3 shadow-xl shadow-zinc-950/10 backdrop-blur dark:border-zinc-800 dark:bg-zinc-900/95 sm:inset-x-auto sm:right-4 sm:mx-0 sm:w-[22rem]"
    role="dialog"
    aria-live="polite"
    aria-label="Install FlexImagePro"
  >
    <div class="flex gap-3">
      <div
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-teal-50 text-teal-700 dark:bg-teal-400/10 dark:text-teal-200"
      >
        <i class="bi bi-phone" aria-hidden="true"></i>
      </div>
      <div class="min-w-0 flex-1">
        <div class="flex items-start justify-between gap-2">
          <div>
            <h2 class="text-sm font-semibold text-zinc-950 dark:text-zinc-50">
              Install FlexImagePro
            </h2>
            <p class="mt-1 text-xs leading-5 text-zinc-600 dark:text-zinc-300">
              @if (installPrompt.needsManualInstall()) {
                Choose "Add to Home Screen" from the Share menu.
              } @else {
                Install it for fast access like an app.
              }
            </p>
          </div>
          <button
            type="button"
            class="focus-ring -mr-1 flex h-8 w-8 shrink-0 items-center justify-center rounded-lg text-zinc-500 hover:bg-zinc-100 hover:text-zinc-950 dark:text-zinc-400 dark:hover:bg-zinc-800 dark:hover:text-white"
            aria-label="Close install popup"
            (click)="installPrompt.dismiss()"
          >
            <i class="bi bi-x-lg text-sm" aria-hidden="true"></i>
          </button>
        </div>
        <div class="mt-3 flex justify-end gap-2">
          <button
            type="button"
            class="primary-button px-3 py-1.5 text-xs"
            (click)="installPrompt.install()"
          >
            @if (installPrompt.canPrompt()) {
              Install
            } @else {
              OK
            }
          </button>
        </div>
      </div>
    </div>
  </aside>
}
