  <div class="mt-4 grid place-items-center rounded-lg bg-zinc-50 p-4 dark:bg-zinc-900">
    <img
      [src]="qrCodeDataUrl()"
      alt="Branded FlexImagePro QR code"
      class="size-64 max-w-full rounded-lg bg-white p-3 shadow-sm"
      loading="lazy"
      decoding="async"
    />
  </div>

  <button
    type="button"
    (click)="download.emit()"
    class="mt-4 w-full rounded-lg border border-zinc-300 px-4 py-3 text-sm font-semibold text-zinc-700 transition hover:bg-zinc-100 dark:border-zinc-700 dark:text-zinc-200 dark:hover:bg-zinc-800"
  >
    Download QR PNG
  </button>
</section>
