@if (compact()) {
  <!-- Compact "+" circle button shown after first upload -->
  <label
    class="inline-flex cursor-pointer items-center gap-3 rounded-full border-2 border-dashed border-teal-500 py-2 pl-2 pr-4 transition hover:bg-teal-50 dark:border-teal-400 dark:hover:bg-teal-950/60"
    title="Add more images"
  >
    <input
      class="sr-only"
      type="file"
      [name]="inputName()"
      [multiple]="multiple()"
      [accept]="acceptValue()"
      (change)="onInput($event)"
    />
    <span
      class="grid size-9 shrink-0 place-items-center rounded-full bg-teal-500 text-white shadow-sm"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="size-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14" />
      </svg>
    </span>
    <span class="text-sm font-semibold text-zinc-700 dark:text-zinc-200">{{ compactLabel() }}</span>
  </label>
} @else {
  <!-- Full drag-drop upload zone -->
  <label
    class="group flex cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-slate-300 p-8 text-center transition dark:border-slate-700 sm:p-10"
    [class.border-teal-500]="isDragging()"
    [class.bg-teal-50]="isDragging()"
    [class.dark:bg-teal-950]="isDragging()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <input
      class="sr-only"
      type="file"
      [name]="inputName()"
      [multiple]="multiple()"
      [accept]="acceptValue()"
      (change)="onInput($event)"
    />
    <span
      class="grid size-12 place-items-center rounded-lg bg-slate-950 text-2xl text-white transition group-hover:bg-teal-600 dark:bg-white dark:text-slate-950"
    >
      <i class="bi bi-upload"></i>
    </span>
    <span class="mt-4 text-base font-semibold text-slate-950 dark:text-white"
      >{{ title() }}</span
    >
    <span class="mt-2 max-w-md text-sm text-slate-600 dark:text-slate-400"
      >{{ description() }}</span
    >
  </label>
}
